name: Windows Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to upload assets to
        required: true
        default: v1.1.0

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Install Rinf CLI
        run: cargo install rinf_cli --locked

      - name: Build Windows package
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\build_flutter_rinf_shell.ps1

      - name: Upload release assets
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          gh release upload $env:RELEASE_TAG `
            .\dist\Excel-Dr-Single.exe `
            .\dist\Excel-Dr-Flutter-portable.zip `
            --clobber
